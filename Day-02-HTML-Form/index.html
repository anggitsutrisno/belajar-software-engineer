<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 2 - HTML Form</title>
</head>
<body>
    
    <h1>Belajar HTML Form</h1>

<form>
    <label for="nama">Nama Lengkap</label>
    <br>
    <input type="text" id="nama" name="nama" placeholder="Masukan Nama lengkap" required>
    <br>
    <label for="email">Email</label>
    <br>
    <input type="email" id="email" name="email" placeholder="Masukan Email anda" required>
    <br>
    <label for="password">Password</label>
    <br>
    <input type="password" id="password" name="password" placeholder="Masukan Password" required>

    <br><br>
    <button type="submit">Login</button>
    </form>
</body>
</html>
