<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 - HTML Table</title>
</head>

<body>
    <h1>Belajar HTML Table</h1>

    <table border="1">
        <thead>
            <tr>
                <th colspan="2">Data Karyawan</th>
            </tr>

            <tr>
                <th>Nama</th>
                <th>Umur</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Anggit</td>
                <td>25</td>
            </tr>
            <tr>
                <td>Budi</td>
                <td>27</td>
            </tr>
            <tr>
                <td>Siti</td>
                <td>40</td>
            </tr>
        </tbody>
    </table>
    <hr>
    <table border="1">
        <thead>
            <tr>
                <th colspan="2">Data Departemen Karyawan</th>
            </tr>
            <tr>
                <th>Departemen</th>
                <th>Nama</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2">IT</td>
                <td>Anggit</td>
            </tr>
            <tr>
                <td>Budi</td>
            </tr>
            <tr>
                <td rowspan="2">HRD</td>
                <td>Siti</td>
            </tr>
            <tr>
                <td>
                    Burhan
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
